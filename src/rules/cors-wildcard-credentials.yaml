rules:
  - id: codemoat-cors-wildcard-credentials
    languages: [javascript, typescript]
    severity: HIGH
    message: >-
      CORS is configured with a wildcard origin ("*") combined with
      credentials: true. Browsers reject this combination for
      credentialed requests in a way that agents commonly "fix" by
      reflecting the request Origin header instead, which effectively
      allows any site to make authenticated cross-origin requests.
      Set an explicit allowlist of trusted origins instead of "*".
    metadata:
      cwe:
        - "CWE-942: Permissive Cross-domain Security Policy with Untrusted Domains"
      owasp:
        - "A05:2021 - Security Misconfiguration"
      category: security
      confidence: HIGH
      references:
        - https://cwe.mitre.org/data/definitions/942.html
    patterns:
      - pattern: 'cors({..., origin: "*", ...})'
      - pattern-inside: 'cors({..., credentials: true, ...})'

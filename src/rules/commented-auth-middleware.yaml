rules:
  - id: codemoat-commented-auth-middleware
    languages: [generic]
    severity: CRITICAL
    message: >-
      An authentication/authorization middleware reference appears
      commented out. This is a common pattern when an agent disables
      auth "temporarily" while debugging a route and forgets to
      re-enable it. Verify this route is intentionally public, or
      restore the middleware.
    metadata:
      cwe:
        - "CWE-306: Missing Authentication for Critical Function"
      owasp:
        - "A07:2021 - Identification and Authentication Failures"
      category: security
      confidence: MEDIUM
      references:
        - https://cwe.mitre.org/data/definitions/306.html
    paths:
      include:
        - "*.js"
        - "*.ts"
        - "*.jsx"
        - "*.tsx"
    pattern-regex: '(?im)^\s*//\s*(requireAuth|isAuthenticated|authMiddleware|verifyToken|ensureAuthenticated|checkAuth|requireLogin|passport\.authenticate)\b.*$'

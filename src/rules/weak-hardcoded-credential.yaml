rules:
  - id: codemoat-weak-hardcoded-credential
    languages: [python, javascript, typescript]
    severity: HIGH
    message: >-
      A weak, dictionary-guessable literal (e.g. "admin123", "password",
      "changeme") is assigned to a credential-shaped field. This is a
      common pattern in agent-scaffolded seed/setup code. Generate a
      random credential instead, or require it to be supplied via
      environment/config at deploy time.
    metadata:
      cwe:
        - "CWE-259: Use of Hard-coded Password"
      owasp:
        - "A07:2021 - Identification and Authentication Failures"
      category: security
      confidence: MEDIUM
      references:
        - https://cwe.mitre.org/data/definitions/259.html
    patterns:
      - pattern-either:
          - pattern: $VAR = $WEAK
          - pattern: $VAR == $WEAK
          - pattern: "$VAR: $WEAK"
      - metavariable-regex:
          metavariable: $VAR
          regex: (?i).*(password|passwd|pwd).*
      - metavariable-regex:
          metavariable: $WEAK
          regex: (?i)^"(admin123|password|password123|changeme|letmein|admin|root|test123|12345678|qwerty123)"$
